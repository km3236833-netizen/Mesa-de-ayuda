<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="public/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="public/css/menu.css">
    <title>Login usuario</title>
</head>
<body>
    <div class="wrapper fadeInDown">
         <div id="formContent">
             <!-- Tabs Titles -->

             <!-- Icon -->
             <div class="fadeIn first">
                 <img src="https://www.b-cube.in/wp-content/uploads/2014/05/aditya-300x177.jpg" id="icon" alt="User Icon" />
                 <h1>Help- Desk</h1>
             </div>

               <!-- Login Form -->
            <form id="frmLogin" method="POST" onsubmit="return loginUsuario()">
             <input type="text" id="login" class="fadeIn second" name="login" placeholder="username" required >
             <input type="text" id="password" class="fadeIn third" name="login" placeholder="password" required>
             <input type="submit" class="fadeIn fourth" value="Entrar">
             </form>

              <!-- Remind Passowrd -->
             <div id="formFooter">
              <a class="underlineHover" href="#">Go to the Site</a>
              </div>

        </div>
    </div>
<script src="public/jquery/jquery-3.6.0.min.js"></script>
<script src="public/bootstrap/popper.min.js"></script>
<script src="public/bootstrap/bootstrap.min.js"></script>

</html>
